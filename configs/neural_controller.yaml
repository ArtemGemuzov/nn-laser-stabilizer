seed: 1

env:
  name: NeuralController
  wrappers:
    step_tracking:
      time_multiplier: 1e6
  args:
    backend:
      type: arx
      # ARX(1, 2, 0): pv(t) = a1*pv(t-1) + b1*co(t) + b2*co(t-1) + c0
      a: [0.9360]
      b: [0.2205, -0.2205]
      c0: 8.2604
      disturbances:
        - { freq: 53.49, amp: 0.0603 }
        - { freq: 29.78, amp: 0.0530 }
      noise_std: 0.9
      dt: 0.005
      pv_min: 40
      pv_max: 200

    setpoint: 120

    control_min: 0
    control_max: 4095
    reset_value: 2000
    reset_steps: 1000

    action:
      type: delta
      max_delta: 75

    process_variable_min: 1000
    process_variable_max: 2000

    observe_prev_error: true
    observe_prev_prev_error: true
    observe_prev_control_output: true
    observe_prev_prev_control_output: false

    error_normalixation_factor: 60

    normalize_obs: true

    reward:
      type: gaussian
      params:
        sigma: 10

training:
  train_start_step: 100_000        
  sync_start_step: 0        
  num_steps: 750_000
  log_frequency: 1
  log_dir: "."
  log_file: train.jsonl

exploration:
  type: none

collector:
  _include: "{CONFIGS_DIR}/collectors/async"

evaluation:
  frequency: 200_000
  num_steps: 100_000
  final:
    enabled: true
    num_steps: -1

buffer:
  capacity: 2_000_000

sampler:
  _include: "{CONFIGS_DIR}/samplers/single"

algorithm:
  type: sac
  gamma: 0.9
  tau: 0.005
  initial_alpha: 0.2

  actor:
    network:
      _include: "{CONFIGS_DIR}/networks/mlp_256_256"
    optimizer:
      lr: 0.0003

  critic:
    network:
      _include: "{CONFIGS_DIR}/networks/mlp_256_256"
    optimizer:
      lr: 0.0003

  alpha_optimizer:
    lr: 0.0003