seed: 1

env:
  name: NeuralController
  wrappers:
    step_tracking:
      time_multiplier: 1e6
  args:
    backend:
      type: experimental
      port: COM3
      timeout: 0.1
      baudrate: 115200
      log_connection: true
      auto_determine_setpoint: false
      setpoint_determination_steps: 6000
      setpoint_determination_max_value: 2000
      setpoint_determination_factor: 0.1

    setpoint: 1200

    control_min: 0
    control_max: 4095

    reset_value: 2000
    reset_steps: 1000

    action:
      type: delta
      max_delta: 75

    process_variable_min: 1000
    process_variable_max: 2000

    observe_prev_error: true
    observe_prev_prev_error: true
    observe_prev_control_output: true
    observe_prev_prev_control_output: false

    error_normalixation_factor: 60

    normalize_obs: true

    reward:
      type: gaussian
      params:
        sigma: 10

training:
  train_start_step: 100_000        
  sync_start_step: 0        
  num_steps: -1
  log_frequency: 1
  log_dir: "."
  log_file: train.jsonl

exploration:
  type: pid
  steps: 100_000
  kp: 3.5
  ki: 11.0
  kd: 0.002
  dt: 0.005
  max_delta: 75

collector:
  _include: "{CONFIGS_DIR}/collectors/async"

evaluation:
  frequency: 300_000
  num_steps: 100_000
  final:
    enabled: false
    num_steps: 0

buffer:
  capacity: 2_000_000

sampler:
  _include: "{CONFIGS_DIR}/samplers/single"

algorithm:
  type: sac
  gamma: 0.9
  tau: 0.005
  initial_alpha: 0.2

  actor:
    network:
      _include: "{CONFIGS_DIR}/networks/mlp_256_256"
    optimizer:
      lr: 0.0003

  critic:
    network:
      _include: "{CONFIGS_DIR}/networks/mlp_256_256"
    optimizer:
      lr: 0.0003

  alpha_optimizer:
    lr: 0.0003