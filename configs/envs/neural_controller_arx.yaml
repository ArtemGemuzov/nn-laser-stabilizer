name: NeuralController
wrappers:
  step_tracking:
    time_multiplier: 1e6

args:
  backend:
    type: arx
    # ARX(1, 2, 0): pv(t) = a1*pv(t-1) + b1*co(t) + b2*co(t-1) + c0
    a: [0.9360]
    b: [0.2205, -0.2205]
    c0: 8.2604
    disturbances:
      - { freq: 53.49, amp: 0.0603 }
      - { freq: 29.78, amp: 0.0530 }
    noise_std: 0.9
    dt: 0.005
    pv_min: 40
    pv_max: 200

  setpoint: 120

  control_min: 0
  control_max: 4095
  reset_value: 2000
  reset_steps: 3

  action:
    type: delta
    max_delta: 20

  process_variable_min: 40
  process_variable_max: 200

  observe_prev_error: true
  observe_prev_prev_error: true
  observe_control_output: true
  error_normalixation_factor: 60

  normalize_obs: true

  setpoint_override_probability: 0.0

  reward:
    alive_bonus: 1.0
