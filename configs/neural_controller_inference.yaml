seed: 1

env:
  name: NeuralController
  wrappers:
    step_tracking:
      time_multiplier: 1e6
  args:
    backend:
      type: experimental
      port: COM3
      timeout: 0.1
      baudrate: 115200
      log_connection: true
      auto_determine_setpoint: false
      setpoint_determination_steps: 6000
      setpoint_determination_max_value: 2000
      setpoint_determination_factor: 0.1

    setpoint: 1200

    control_min: 0
    control_max: 4095

    reset_value: 2000
    reset_steps: 1000

    action:
      type: delta
      max_delta: 100

    process_variable_min: 1000
    process_variable_max: 2000

    observe_prev_error: true
    observe_prev_prev_error: true
    observe_prev_control_output: true
    observe_prev_prev_control_output: false

    error_normalixation_factor: 60

    normalize_obs: true

    reward:
      type: gaussian
      params:
        sigma: 10
      action_penalty: 0.1

inference:
  agent_path: "{RESOURCES_DIR}/agent_sac"
  num_steps: -1
  log_frequency: -1

collector:
  _include: "{CONFIGS_DIR}/collectors/sync"

buffer:
  _include: "{CONFIGS_DIR}/buffers/10k"

algorithm:
  type: sac
  gamma: 0.9
  tau: 0.005
  initial_alpha: 0.2

  target_entropy: fixed
  target_entropy_value: -5

  actor:
    network:
      _include: "{CONFIGS_DIR}/networks/mlp_256_256"
    optimizer:
      lr: 0.0003

  critic:
    network:
      _include: "{CONFIGS_DIR}/networks/mlp_256_256"
    optimizer:
      lr: 0.0003

  alpha_optimizer:
    lr: 0.0003
